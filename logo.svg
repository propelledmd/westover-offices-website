<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100" aria-label="Westover Offices">
  <!-- Box outline around W -->
  <rect x="4" y="4" width="88" height="88" rx="0" ry="0"
        fill="none" stroke="#8C7B5E" stroke-width="4"/>
  <!-- W letterform -->
  <text x="48" y="70" font-family="Georgia, 'Times New Roman', serif"
        font-size="62" font-weight="400" fill="#8C7B5E"
        text-anchor="middle" letter-spacing="-2">W</text>
  <!-- WESTOVER -->
  <text x="118" y="48" font-family="Georgia, 'Times New Roman', serif"
        font-size="38" font-weight="400" fill="#8C7B5E"
        text-anchor="start" letter-spacing="3">WESTOVER</text>
  <!-- OFFICES -->
  <text x="120" y="86" font-family="Georgia, 'Times New Roman', serif"
        font-size="38" font-weight="400" fill="#8C7B5E"
        text-anchor="start" letter-spacing="3">OFFICES</text>
</svg>
